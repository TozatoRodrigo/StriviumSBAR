name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Lint, Test and Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Ensure Yarn Lockfile Strategy
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found. Use yarn.lock as single source of truth."
            exit 1
          fi

      - name: Run Lint
        run: yarn lint

      - name: Run Tests
        run: yarn test

      - name: Contract Smoke Tests
        run: yarn test:contracts:smoke

      - name: Security Check
        run: yarn audit --level high
