# Exclude a variety of commonly ignored directories.
exclude = [
    ".git",
    ".git-rewrite",
    ".mypy_cache",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".venv",
    ".vscode",
    "__pypackages__",
    "__pycache__",
    "venv",
    "db_data",
    "storage"
]

line-length = 88
indent-width = 4

target-version = "py313"

[lint]
select = ["ALL"]
ignore = [
    "D203",
    "D213",
    "COM812",
    "CPY001",
    "D104",
    "D100",
    "D103",
    "ARG001",
    "D101",
    "ANN401",
    "D102",
    "S101",
    "E501",
    "TD003",
    "FIX002",
    "TD002",
    "FBT001",
    "FBT002",
    "PLR0917",
    "PLR0913",
    "D106",
    "DTZ005",
    "TRY002",
    "TRY301",
    "BLE001",
    "TRY300",
    "N999",
    "D107",
    "ERA001",
]
preview = true

fixable = ["ALL"]
unfixable = []

dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
quote-style = "double"

indent-style = "space"

skip-magic-trailing-comma = false

line-ending = "auto"
