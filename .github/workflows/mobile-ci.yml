name: Mobile CI

on:
  push:
    branches:
      - "**"
    paths:
      - "app-front-main/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "app-front-main/**"
      - ".github/workflows/mobile-ci.yml"

permissions:
  contents: read

jobs:
  mobile-ci:
    name: Lint, test, contract smoke, and web export
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: app-front-main
    env:
      NEXT_PUBLIC_API_URL: https://api.link.strivium.com.br
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAA-ci-placeholder
      ALLOW_PLACEHOLDER_TURNSTILE_SITE_KEY: "true"
      NEXT_PUBLIC_EXPERIMENTAL_SBAR_VOICE_DICTATION: "false"
      NEXT_PUBLIC_EXPERIMENTAL_SBAR_AI_DICTATION: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: app-front-main/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Ensure Yarn lockfile strategy
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found. Use yarn.lock as single source of truth."
            exit 1
          fi

      - name: Validate store environment defaults
        run: yarn release:check-env

      - name: Run lint
        run: yarn lint

      - name: Run tests
        run: yarn test

      - name: Run contract smoke tests
        run: yarn test:contracts:smoke

      - name: Build static web export
        run: yarn build
