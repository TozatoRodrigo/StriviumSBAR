name: Mobile Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version_name:
        description: "Release version, for example 1.0.0"
        required: true
        type: string
      release_target:
        description: "Platforms to build and deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ios
          - android
      google_play_track:
        description: "Google Play track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

permissions:
  contents: read

env:
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://strivium.link.servidortozato.cloud/api' }}
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
  NEXT_PUBLIC_EXPERIMENTAL_SBAR_VOICE_DICTATION: "false"
  NEXT_PUBLIC_EXPERIMENTAL_SBAR_AI_DICTATION: "false"

jobs:
  preflight-secrets:
    name: Validate CI secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: app-front-main
    env:
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GOOGLE_PLAY_CREDENTIALS: ${{ secrets.GOOGLE_PLAY_CREDENTIALS }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
      MATCH_GIT_PRIVATE_KEY_BASE64: ${{ secrets.MATCH_GIT_PRIVATE_KEY_BASE64 }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
      RELEASE_TARGET: ${{ inputs.release_target || 'all' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate web build secrets
        run: node scripts/release/assert-ci-secrets.mjs build-web

      - name: Validate Android build secrets
        if: env.RELEASE_TARGET == 'all' || env.RELEASE_TARGET == 'android'
        run: node scripts/release/assert-ci-secrets.mjs android-build

      - name: Validate iOS build secrets
        if: env.RELEASE_TARGET == 'all' || env.RELEASE_TARGET == 'ios'
        run: node scripts/release/assert-ci-secrets.mjs ios-build

      - name: Validate Android deploy secrets
        if: env.RELEASE_TARGET == 'all' || env.RELEASE_TARGET == 'android'
        run: node scripts/release/assert-ci-secrets.mjs android-deploy

      - name: Validate iOS deploy secrets
        if: env.RELEASE_TARGET == 'all' || env.RELEASE_TARGET == 'ios'
        run: node scripts/release/assert-ci-secrets.mjs ios-deploy

  build-web:
    name: Build web export
    needs: preflight-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: app-front-main
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: app-front-main/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Validate store environment
        run: yarn release:check-env

      - name: Build web export
        run: yarn build

      - name: Upload web export
        uses: actions/upload-artifact@v4
        with:
          name: mobile-web-export
          path: app-front-main/out

  build-android:
    name: Build Android AAB
    needs: build-web
    if: ${{ (inputs.release_target || 'all') == 'all' || (inputs.release_target || 'all') == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: app-front-main
    env:
      VERSION_NAME: ${{ inputs.version_name || github.ref_name }}
      VERSION_CODE: ${{ github.run_number }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: app-front-main/yarn.lock

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Setup Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: app-front-main

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download web export
        uses: actions/download-artifact@v4
        with:
          name: mobile-web-export
          path: app-front-main/out

      - name: Build Android app bundle
        run: bundle exec fastlane android build version_name:"${VERSION_NAME#v}" version_code:"$VERSION_CODE"

      - name: Upload Android AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: app-front-main/android/app/build/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS IPA
    needs: build-web
    if: ${{ (inputs.release_target || 'all') == 'all' || (inputs.release_target || 'all') == 'ios' }}
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: app-front-main
    env:
      VERSION_NAME: ${{ inputs.version_name || github.ref_name }}
      BUILD_NUMBER: ${{ github.run_number }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
      MATCH_GIT_PRIVATE_KEY_BASE64: ${{ secrets.MATCH_GIT_PRIVATE_KEY_BASE64 }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: app-front-main/yarn.lock

      - name: Setup Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: app-front-main

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Download web export
        uses: actions/download-artifact@v4
        with:
          name: mobile-web-export
          path: app-front-main/out

      - name: Build iOS IPA
        run: bundle exec fastlane ios build version_name:"${VERSION_NAME#v}" build_number:"$BUILD_NUMBER"

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app-front-main/build/ios/StriviumLink.ipa

  deploy-android-internal:
    name: Deploy Android to Google Play
    needs: build-android
    if: ${{ (inputs.release_target || 'all') == 'all' || (inputs.release_target || 'all') == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    defaults:
      run:
        working-directory: app-front-main
    env:
      GOOGLE_PLAY_CREDENTIALS: ${{ secrets.GOOGLE_PLAY_CREDENTIALS }}
      GOOGLE_PLAY_TRACK: ${{ inputs.google_play_track || 'internal' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: app-front-main

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: app-front-main/android/app/build/outputs/bundle/release

      - name: Deploy Android app bundle
        run: bundle exec fastlane android deploy

  deploy-ios-testflight:
    name: Deploy iOS to TestFlight
    needs: build-ios
    if: ${{ (inputs.release_target || 'all') == 'all' || (inputs.release_target || 'all') == 'ios' }}
    runs-on: macos-latest
    timeout-minutes: 20
    environment: production
    defaults:
      run:
        working-directory: app-front-main
    env:
      APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: app-front-main

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: app-front-main/build/ios

      - name: Deploy iOS IPA
        run: bundle exec fastlane ios deploy
